<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Spokemon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "jszip": "https://esm.run/jszip",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
    <style>
      body {
        font-family: 'Nunito', sans-serif;
        background-color: #0f172a; /* Slate 900 */
        margin: 0;
        height: 100%;
        overflow: hidden; /* Prevent body scroll if app handles it */
        overscroll-behavior: none; /* Prevent pull-to-refresh on mobile */
      }
      
      #root {
        height: 100%;
      }
      
      .font-pixel {
        font-family: 'VT323', monospace;
      }
      
      .font-retro {
        font-family: 'Press Start 2P', cursive;
      }

      /* Utilities */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* --- ANIMATIONS --- */
      
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(1deg); }
      }
      
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px) rotate(-2deg); }
        75% { transform: translateX(8px) rotate(2deg); }
      }
      
      .animate-shake {
        animation: shake 0.4s ease-in-out;
      }

      /* Intense shake for evolution charging */
      @keyframes chargeShake {
        0% { transform: translate(0, 0) rotate(0); filter: brightness(1) contrast(1); }
        25% { transform: translate(-5px, 5px) rotate(-5deg); filter: brightness(1.5) contrast(1.2); }
        50% { transform: translate(5px, -5px) rotate(5deg); filter: brightness(2) contrast(1.5); }
        75% { transform: translate(-5px, -5px) rotate(-5deg); filter: brightness(2.5) contrast(2); }
        100% { transform: translate(5px, 5px) rotate(5deg); filter: brightness(3) contrast(3); }
      }

      .animate-charge {
        animation: chargeShake 2s ease-in forwards;
      }

      @keyframes flashWhite {
        0% { opacity: 0; }
        10% { opacity: 1; }
        100% { opacity: 0; }
      }

      .animate-flash {
        animation: flashWhite 1.5s ease-out forwards;
      }

      @keyframes spinSlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .animate-spin-slow {
        animation: spinSlow 10s linear infinite;
      }

      @keyframes popUp {
        0% { transform: scale(0.5) translateY(20px); opacity: 0; }
        50% { transform: scale(1.2) translateY(-10px); opacity: 1; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }

      .animate-pop {
        animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      @keyframes floatUpFade {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
      }
      
      .animate-float-text {
        animation: floatUpFade 1s ease-out forwards;
      }

      @keyframes gridScroll {
        0% { background-position: 0 0; }
        100% { background-position: 40px 40px; }
      }

      .bg-grid-pattern {
        background-image: 
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: gridScroll 4s linear infinite;
      }

      @keyframes breathe {
        0%, 100% { transform: translateY(0); filter: brightness(1); }
        50% { transform: translateY(-8px); filter: brightness(1.1); }
      }
      
      .animate-breathe {
        animation: breathe 4s ease-in-out infinite;
      }

      /* Sunburst effect for rewards */
      .bg-sunburst {
        background: conic-gradient(
          from 0deg,
          transparent 0deg 15deg,
          rgba(255, 255, 255, 0.1) 15deg 30deg,
          transparent 30deg 45deg,
          rgba(255, 255, 255, 0.1) 45deg 60deg,
          transparent 60deg 75deg,
          rgba(255, 255, 255, 0.1) 75deg 90deg,
          transparent 90deg 105deg,
          rgba(255, 255, 255, 0.1) 105deg 120deg,
          transparent 120deg 135deg,
          rgba(255, 255, 255, 0.1) 135deg 150deg,
          transparent 150deg 165deg,
          rgba(255, 255, 255, 0.1) 165deg 180deg,
          transparent 180deg 195deg,
          rgba(255, 255, 255, 0.1) 195deg 210deg,
          transparent 210deg 225deg,
          rgba(255, 255, 255, 0.1) 225deg 240deg,
          transparent 240deg 255deg,
          rgba(255, 255, 255, 0.1) 255deg 270deg,
          transparent 270deg 285deg,
          rgba(255, 255, 255, 0.1) 285deg 300deg,
          transparent 300deg 315deg,
          rgba(255, 255, 255, 0.1) 315deg 330deg,
          transparent 330deg 345deg,
          rgba(255, 255, 255, 0.1) 345deg 360deg
        );
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
